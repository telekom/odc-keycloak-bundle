---
# CNPG recovery cluster example (non-destructive restore flow)
# Creates a new cluster restored from object storage backup source.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: keycloak-db-restore
  namespace: keycloak-prod
spec:
  # imageName must match the source cluster's PostgreSQL version to avoid
  # restore failures due to major-version mismatches.
  imageName: ghcr.io/cloudnative-pg/postgresql:18.3
  instances: 1
  bootstrap:
    recovery:
      source: keycloak-backup
  externalClusters:
    - name: keycloak-backup
      plugin:
        name: barman-cloud.cloudnative-pg.io
        parameters:
          barmanObjectName: keycloak-backup-store
          serverName: keycloak-db
  storage:
    size: 5Gi
