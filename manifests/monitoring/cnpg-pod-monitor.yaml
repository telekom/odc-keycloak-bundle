apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  # Avoid CNPG-managed PodMonitor name collision during cluster reconciles.
  name: keycloak-db-metrics
  labels:
    app: keycloak
spec:
  selector:
    matchLabels:
      cnpg.io/cluster: keycloak-db
  podMetricsEndpoints:
    - port: metrics
      interval: 30s
      scrapeTimeout: 10s
