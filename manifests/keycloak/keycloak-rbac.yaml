# Role granting the Keycloak ServiceAccount read access to pods in its namespace.
# Required by Infinispan KUBE_PING for multi-replica cluster discovery (KC_CACHE_STACK=kubernetes).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: keycloak-pod-discovery
  labels:
    app: keycloak
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: keycloak-pod-discovery
  labels:
    app: keycloak
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: keycloak-pod-discovery
subjects:
  - kind: ServiceAccount
    name: keycloak
