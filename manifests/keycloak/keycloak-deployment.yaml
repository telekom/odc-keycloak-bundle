apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  labels:
    app: keycloak
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        - name: wait-for-db
          image: busybox:1.37@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          command: ['sh', '-c', 'until nc -z keycloak-db-rw 5432; do echo waiting for db; sleep 2; done;']
          resources:
            requests:
              memory: "64Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "100m"
      containers:
        - name: keycloak
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          image: quay.io/keycloak/keycloak:26.6.1@sha256:26ae26445475f7fac5f90ee138b1bdb64324f5815fb16133ffdbdb122d97c4d8
          args:
            - start
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 8443
              name: https
            - containerPort: 9000
              name: management
          env:
            # Official Keycloak environment variables (KC_ prefix)
            # Database configuration
            - name: KC_DB
              value: postgres
            - name: KC_DB_URL_HOST
              value: keycloak-db-rw  # CloudNativePG read-write service
            - name: KC_DB_URL_PORT
              value: "5432"
            - name: KC_DB_URL_DATABASE
              value: keycloak
            - name: KC_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-db-app
                  key: username
            - name: KC_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-db-app
                  key: password
            # HTTP configuration
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_HTTP_PORT
              value: "8080"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HOSTNAME_STRICT_HTTPS
              value: "false"
            # Health and metrics
            - name: KC_HEALTH_ENABLED
              value: "true"
            - name: KC_METRICS_ENABLED
              value: "true"
            # Structured logging (JSON for log aggregation)
            - name: KC_LOG_FORMAT
              value: "json"
            - name: KC_LOG_LEVEL
              value: "INFO"
            # OpenTelemetry tracing (Quarkus native OTEL support)
            # Set KC_TRACING_ENABLED=true and configure KC_TRACING_ENDPOINT
            # to point at your cluster's OTEL Collector gRPC endpoint (OTLP/gRPC).
            # Example: http://opentelemetry-collector.observability.svc:4317
            - name: KC_TRACING_ENABLED
              value: "false"
            - name: KC_TRACING_ENDPOINT
              value: "http://opentelemetry-collector.observability.svc:4317"
            - name: KC_TRACING_SAMPLER_TYPE
              value: "traceidratio"
            - name: KC_TRACING_SAMPLER_RATIO
              value: "0.1"
            - name: KC_TRACING_SERVICE_NAME
              value: "keycloak"
            # Proxy configuration (for running behind ingress/load balancer)
            - name: KC_PROXY
              value: edge
            # Admin credentials
            - name: KC_BOOTSTRAP_ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin
                  key: KEYCLOAK_ADMIN
            - name: KC_BOOTSTRAP_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: keycloak-admin
                  key: KEYCLOAK_ADMIN_PASSWORD
          resources:
            requests:
              memory: "512Mi"
              cpu: "50m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 9000
            initialDelaySeconds: 180
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 9000
            initialDelaySeconds: 90
            periodSeconds: 10
