name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan on Mondays at 06:00 UTC
    - cron: '0 6 * * 1'

permissions:
  contents: read
  packages: read

env:
  OCM_REGISTRY: ${{ vars.OCM_REGISTRY || secrets.OCM_REGISTRY || format('ghcr.io/{0}', github.repository_owner) }}
  KEYCLOAK_IMAGE: quay.io/keycloak/keycloak:26.6.3@sha256:5fdbf2dbb5897cc34e82de49d13e23db011f9925089dbc555fc095f2c8bc1dac
  POSTGRES_IMAGE: ghcr.io/cloudnative-pg/postgresql:18.4@sha256:1a8ef3dc0dc214c1764660291b29a98288b13753c09e9981b86eaf0c75de8bdc
  CNPG_OPERATOR_IMAGE: ghcr.io/cloudnative-pg/cloudnative-pg:1.29.1@sha256:0dfff19ba7b52ca25851a1010028b6940fff2e233290465af1cfb08a5f3f4661
  PROMETHEUS_OPERATOR_IMAGE: quay.io/prometheus-operator/prometheus-operator:v0.91.0@sha256:9e53e13139218aca79ee000172de73355e9174ef2904585bfad9497fc71aae2d
  CONFIG_CLI_IMAGE: quay.io/adorsys/keycloak-config-cli:latest-26@sha256:1b22dfaa9ae0c71f74b0342f9221a6510f272da5def683dbba26a98e6b1b1411
  OPERATOR_IMAGE: ${{ vars.OCM_REGISTRY || secrets.OCM_REGISTRY || format('ghcr.io/{0}', github.repository_owner) }}/keycloak-operator:0.3.0 # yamllint disable-line rule:line-length

jobs:
  trivy:
    name: CVE Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to GHCR for release image scan
        if: ${{ github.event_name != 'pull_request' && !endsWith(github.event.repository.name, '-dev') }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan manifests for misconfigurations
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Scan Keycloak image for CVEs
        if: success() || failure()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: image
          image-ref: ${{ env.KEYCLOAK_IMAGE }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Scan PostgreSQL image for CVEs
        if: success() || failure()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: image
          image-ref: ${{ env.POSTGRES_IMAGE }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Scan CNPG Operator image for CVEs
        if: success() || failure()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: image
          image-ref: ${{ env.CNPG_OPERATOR_IMAGE }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Check Keycloak Operator release image
        id: operator_release_image
        if: ${{ (success() || failure()) && github.event_name != 'pull_request' && !endsWith(github.event.repository.name, '-dev') }}
        run: |
          if docker manifest inspect "${OPERATOR_IMAGE}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "exists=false" >> "$GITHUB_OUTPUT"
          echo "::warning title=Operator release image missing::Skipping Trivy scan for ${OPERATOR_IMAGE}; the tag does not exist yet."
          {
            echo "### Operator release image scan skipped"
            echo ""
            echo "Image not found: \`${OPERATOR_IMAGE}\`"
            echo ""
            echo "The CI workflow scans the freshly built operator image by immutable \`sha-<commit>\` tag."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Scan Keycloak Operator image for CVEs
        if: ${{ (success() || failure()) && steps.operator_release_image.outputs.exists == 'true' }}
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: image
          image-ref: ${{ env.OPERATOR_IMAGE }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Scan Prometheus Operator image for CVEs
        if: success() || failure()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: image
          image-ref: ${{ env.PROMETHEUS_OPERATOR_IMAGE }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Scan Keycloak Config CLI image for CVEs
        if: success() || failure()
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: image
          image-ref: ${{ env.CONFIG_CLI_IMAGE }}
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
