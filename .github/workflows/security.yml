name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan on Mondays at 06:00 UTC
    - cron: '0 6 * * 1'

permissions:
  contents: read

jobs:
  trivy:
    name: CVE Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Scan manifests for misconfigurations
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          severity: HIGH,CRITICAL
          exit-code: 0

      - name: Scan Keycloak image for CVEs
        if: success() || failure()
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: quay.io/keycloak/keycloak:26.5.5
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Scan PostgreSQL image for CVEs
        if: success() || failure()
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: ghcr.io/cloudnative-pg/postgresql:18.3
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Scan CNPG Operator image for CVEs
        if: success() || failure()
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: ghcr.io/cloudnative-pg/cloudnative-pg:1.28.1
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Scan Keycloak Operator image for CVEs
        if: success() || failure()
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: image
          image-ref: ghcr.io/${{ github.repository_owner }}/keycloak-operator:latest
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: 1
