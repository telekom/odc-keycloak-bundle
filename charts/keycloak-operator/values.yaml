# Default values for keycloak-operator

replicaCount: 2

image:
  repository: ghcr.io/opendefensecloud/keycloak-operator
  pullPolicy: IfNotPresent
  tag: "0.3.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

labels:
  component: keycloak-operator
  partOf: keycloak-bundle

serviceAccount:
  create: true
  name: ""

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

nodeSelector: {}
tolerations: []
affinity: {}

# Operator configuration
operator:
  logLevel: info
  configCliImage:
    # Image to use for the configuration Job.
    # Digest-pinned for airgapped supply-chain integrity — must match the
    # signed artifact in component-constructor.yaml. The deployment template
    # renders "<repository>:<tag>", so the digest is carried in the tag field.
    repository: quay.io/adorsys/keycloak-config-cli
    tag: "latest-26@sha256:1b22dfaa9ae0c71f74b0342f9221a6510f272da5def683dbba26a98e6b1b1411"
  adminSecret:
    name: "keycloak-admin-creds"
    key: "password"

metrics:
  enabled: true
  port: 8080
  path: /metrics
  serviceMonitor:
    enabled: false
    interval: "30s"
    labels: {}

configCLI:
  # ServiceAccount assigned to config-cli Job pods.
  # config-cli only calls Keycloak's HTTP API — no K8s API access is needed.
  serviceAccountName: keycloak-config-cli
