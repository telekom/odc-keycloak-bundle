apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: keycloakinstance
spec:
  # Schema for KeycloakInstance CRD (generated by KRO)
  schema:
    apiVersion: v1alpha1
    kind: KeycloakInstance
    spec:
      type: object
      required:
        - namespace
      properties:
        namespace:
          type: string
          description: "Target namespace for all instance resources (administrator-controlled, no prefix enforced)"
        replicas:
          type: integer
          default: 1
          minimum: 1
        dbInstances:
          type: integer
          default: 1
          minimum: 1
          description: "PostgreSQL instances (1 for dev, 3 for HA)"
        dbStorageSize:
          type: string
          default: "5Gi"
        hostname:
          type: string
          default: ""
          description: "External hostname (optional, for production)"
        adminUser:
          type: string
          default: "admin"
          description: "Initial admin username"
        adminPassword:
          type: string
          default: "admin"
          description: "Initial admin password (CHANGE ON FIRST LOGIN)"
    status:
      type: object
      properties:
        ready:
          type: boolean
        namespace:
          type: string
        keycloakUrl:
          type: string

  resources:
    # 1. Namespace
    - id: namespace
      template:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: "{{ .spec.namespace }}"
          labels:
            app.kubernetes.io/name: keycloak
            app.kubernetes.io/instance: "{{ .metadata.name }}"
            app.kubernetes.io/managed-by: kro

    # 2. CloudNativePG Cluster
    - id: postgres-cluster
      template:
        apiVersion: postgresql.cnpg.io/v1
        kind: Cluster
        metadata:
          name: keycloak-db
          namespace: "{{ .spec.namespace }}"
        spec:
          # renovate: datasource=docker
          imageName: ghcr.io/cloudnative-pg/postgresql:18.3@sha256:36f19b80864f5ae23bb6ce87166e413154bf8c1b705e893ec8360ebb4791e63e
          instances: "{{ .spec.dbInstances }}"
          storage:
            size: "{{ .spec.dbStorageSize }}"
          bootstrap:
            initdb:
              database: keycloak
              owner: keycloak
          postgresql:
            parameters:
              max_connections: "100"
              shared_buffers: "128MB"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      dependsOn:
        - namespace

    # 3. Keycloak Admin Secret
    - id: keycloak-admin-secret
      template:
        apiVersion: v1
        kind: Secret
        metadata:
          name: keycloak-admin
          namespace: "{{ .spec.namespace }}"
        type: Opaque
        stringData:
          KEYCLOAK_ADMIN: "{{ .spec.adminUser }}"
          KEYCLOAK_ADMIN_PASSWORD: "{{ .spec.adminPassword }}"
      dependsOn:
        - namespace

    # 4. Keycloak Deployment (Official Keycloak from Quay.io)
    - id: keycloak-deployment
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: keycloak
          namespace: "{{ .spec.namespace }}"
          labels:
            app: keycloak
        spec:
          replicas: "{{ .spec.replicas }}"
          strategy:
            type: RollingUpdate
            rollingUpdate:
              maxUnavailable: 0
              maxSurge: 1
          selector:
            matchLabels:
              app: keycloak
          template:
            metadata:
              labels:
                app: keycloak
            spec:
              serviceAccountName: keycloak
              containers:
                - name: keycloak
                  image: quay.io/keycloak/keycloak:26.6.1@sha256:26ae26445475f7fac5f90ee138b1bdb64324f5815fb16133ffdbdb122d97c4d8
                  args:
                    - start
                  ports:
                    - containerPort: 8080
                      name: http
                    - containerPort: 8443
                      name: https
                  env:
                    # Official Keycloak environment variables (KC_ prefix)
                    # Database configuration
                    - name: KC_DB
                      value: postgres
                    - name: KC_DB_URL_HOST
                      value: keycloak-db-rw
                    - name: KC_DB_URL_PORT
                      value: "5432"
                    - name: KC_DB_URL_DATABASE
                      value: keycloak
                    - name: KC_DB_USERNAME
                      valueFrom:
                        secretKeyRef:
                          name: keycloak-db-app
                          key: username
                    - name: KC_DB_PASSWORD
                      valueFrom:
                        secretKeyRef:
                          name: keycloak-db-app
                          key: password
                    # HTTP configuration
                    - name: KC_HTTP_ENABLED
                      value: "true"
                    - name: KC_HTTP_PORT
                      value: "8080"
                    - name: KC_HOSTNAME_STRICT
                      value: "false"
                    - name: KC_HOSTNAME_STRICT_HTTPS
                      value: "false"
                    # Health and metrics
                    - name: KC_HEALTH_ENABLED
                      value: "true"
                    - name: KC_METRICS_ENABLED
                      value: "true"
                    # Proxy configuration
                    - name: KC_PROXY
                      value: edge
                    # Admin credentials
                    - name: KEYCLOAK_ADMIN
                      valueFrom:
                        secretKeyRef:
                          name: keycloak-admin
                          key: KEYCLOAK_ADMIN
                    - name: KEYCLOAK_ADMIN_PASSWORD
                      valueFrom:
                        secretKeyRef:
                          name: keycloak-admin
                          key: KEYCLOAK_ADMIN_PASSWORD
                  resources:
                    requests:
                      memory: "512Mi"
                      cpu: "250m"
                    limits:
                      memory: "1Gi"
                      cpu: "1000m"
                  livenessProbe:
                    httpGet:
                      path: /health/live
                      port: 9000
                    initialDelaySeconds: 180
                    periodSeconds: 20
                  readinessProbe:
                    httpGet:
                      path: /health/ready
                      port: 9000
                    initialDelaySeconds: 90
                    periodSeconds: 10
      dependsOn:
        - keycloak-admin-secret
        - postgres-cluster

    # 5. Keycloak Service
    - id: keycloak-service
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: keycloak
          namespace: "{{ .spec.namespace }}"
        spec:
          type: ClusterIP
          ports:
            - port: 8080
              targetPort: 8080
              name: http
            - port: 8443
              targetPort: 8443
              name: https
            - port: 9000
              targetPort: 9000
              name: management
          selector:
            app: keycloak
      dependsOn:
        - keycloak-deployment

    # 9. Keycloak PodDisruptionBudget
    - id: keycloak-pdb
      template:
        apiVersion: policy/v1
        kind: PodDisruptionBudget
        metadata:
          name: keycloak
          namespace: "{{ .spec.namespace }}"
          labels:
            app: keycloak
            app.kubernetes.io/managed-by: kro
        spec:
          minAvailable: 1
          selector:
            matchLabels:
              app: keycloak
      dependsOn:
        - keycloak-deployment

    # 10. Operator ServiceAccount
    - id: operator-serviceaccount
      template:
        apiVersion: v1
        kind: ServiceAccount
        metadata:
          name: keycloak-operator
          namespace: "{{ .spec.namespace }}"
          labels:
            app.kubernetes.io/name: keycloak-operator
            app.kubernetes.io/instance: "{{ .metadata.name }}"
            app.kubernetes.io/managed-by: kro
      dependsOn:
        - namespace

    # 11. Operator Role (namespace-scoped: one per instance)
    - id: operator-role
      template:
        apiVersion: rbac.authorization.k8s.io/v1
        kind: Role
        metadata:
          name: keycloak-operator
          namespace: "{{ .spec.namespace }}"
          labels:
            app.kubernetes.io/name: keycloak-operator
            app.kubernetes.io/instance: "{{ .metadata.name }}"
            app.kubernetes.io/managed-by: kro
        rules:
          - apiGroups: ["keycloak.opendefense.cloud"]
            resources:
              [
                "clients",
                "realms",
                "users",
                "groups",
                "clientscopes",
                "authflows",
                "identityproviders",
              ]
            verbs:
              ["get", "list", "watch", "create", "update", "patch", "delete"]
          - apiGroups: ["keycloak.opendefense.cloud"]
            resources:
              [
                "clients/status",
                "realms/status",
                "users/status",
                "groups/status",
                "clientscopes/status",
                "authflows/status",
                "identityproviders/status",
              ]
            verbs: ["get", "update", "patch"]
          - apiGroups: ["keycloak.opendefense.cloud"]
            resources:
              [
                "clients/finalizers",
                "realms/finalizers",
                "users/finalizers",
                "groups/finalizers",
                "clientscopes/finalizers",
                "authflows/finalizers",
                "identityproviders/finalizers",
              ]
            verbs: ["update"]
          - apiGroups: ["coordination.k8s.io"]
            resources: ["leases"]
            verbs: ["get", "create", "update", "patch", "delete"]
          - apiGroups: ["batch"]
            resources: ["jobs"]
            verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
          - apiGroups: [""]
            resources: ["pods"]
            verbs: ["get"]
          - apiGroups: [""]
            resources: ["secrets"]
            verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
          - apiGroups: [""]
            resources: ["events"]
            verbs: ["create", "patch"]
      dependsOn:
        - namespace

    # 12. Operator RoleBinding
    - id: operator-rolebinding
      template:
        apiVersion: rbac.authorization.k8s.io/v1
        kind: RoleBinding
        metadata:
          name: keycloak-operator
          namespace: "{{ .spec.namespace }}"
          labels:
            app.kubernetes.io/name: keycloak-operator
            app.kubernetes.io/instance: "{{ .metadata.name }}"
            app.kubernetes.io/managed-by: kro
        roleRef:
          apiGroup: rbac.authorization.k8s.io
          kind: Role
          name: keycloak-operator
        subjects:
          - kind: ServiceAccount
            name: keycloak-operator
            namespace: "{{ .spec.namespace }}"
      dependsOn:
        - operator-serviceaccount
        - operator-role

    # 13. Operator Deployment
    - id: operator-deployment
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: keycloak-operator
          namespace: "{{ .spec.namespace }}"
          labels:
            app: keycloak-operator
            app.kubernetes.io/name: keycloak-operator
            app.kubernetes.io/instance: "{{ .metadata.name }}"
            app.kubernetes.io/managed-by: kro
        spec:
          replicas: 2
          selector:
            matchLabels:
              app: keycloak-operator
              app.kubernetes.io/instance: "{{ .metadata.name }}"
          template:
            metadata:
              labels:
                app: keycloak-operator
                app.kubernetes.io/instance: "{{ .metadata.name }}"
            spec:
              serviceAccountName: keycloak-operator
              containers:
                - name: operator
                  image: ghcr.io/opendefensecloud/keycloak-operator:0.2.0
                  imagePullPolicy: IfNotPresent
                  env:
                    - name: KEYCLOAK_URL
                      value: "http://keycloak:8080"
                    - name: KEYCLOAK_USER
                      valueFrom:
                        secretKeyRef:
                          name: keycloak-admin
                          key: KEYCLOAK_ADMIN
                    - name: KEYCLOAK_ADMIN_SECRET_NAME
                      value: "keycloak-admin"
                    - name: KEYCLOAK_ADMIN_SECRET_KEY
                      value: "KEYCLOAK_ADMIN_PASSWORD"
                    - name: POD_NAME
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.name
                    - name: WATCH_NAMESPACE
                      valueFrom:
                        fieldRef:
                          fieldPath: metadata.namespace
                    - name: CHECK_INTERVAL
                      value: "30"
                  resources:
                    requests:
                      cpu: 100m
                      memory: 64Mi
                    limits:
                      cpu: 500m
                      memory: 128Mi
      dependsOn:
        - operator-rolebinding
        - keycloak-admin-secret

  # Status aggregation
  status:
    ready:
      allOf:
        - ".status.keycloak-deployment.status.readyReplicas >= 1"
    namespace: "{{ .spec.namespace }}"
    keycloakUrl: "http://keycloak.{{ .spec.namespace }}.svc:8080"
